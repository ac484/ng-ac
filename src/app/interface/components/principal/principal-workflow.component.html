<nz-card [nzTitle]="'請款流程編輯'" [nzExtra]="saveButtonTemplate">
    <ng-template #saveButtonTemplate>
        <button nz-button nzType="primary" (click)="saveWorkflow()" [nzLoading]="loading">
            <span nz-icon nzType="save"></span>保存
        </button>
    </ng-template>

    <div class="workflow-editor">
        <div *ngIf="!principal" class="no-selection">
            <nz-empty nzNotFoundImage="simple" [nzNotFoundContent]="'請選擇一個 Principal 來編輯請款流程'">
            </nz-empty>
        </div>

        <div *ngIf="principal && loading" class="loading">
            <nz-spin nzSize="large"></nz-spin>
        </div>

        <div *ngIf="principal && !loading" class="workflow-content">
            <h4>Principal: {{ principal.name.getValue() }}</h4>

            <!-- 流程步驟列表 -->
            <nz-list [nzDataSource]="workflowSteps" [nzRenderItem]="workflowItemTemplate">
                <ng-template #workflowItemTemplate let-step let-i="index">
                    <nz-list-item>
                        <nz-list-item-meta>
                            <nz-list-item-meta-title>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <nz-input-group>
                                        <input nz-input [(ngModel)]="step.name" placeholder="步驟名稱" />
                                    </nz-input-group>
                                    <nz-tag [nzColor]="step.isActive ? 'green' : 'red'">
                                        {{ step.isActive ? '啟用' : '停用' }}
                                    </nz-tag>
                                </div>
                            </nz-list-item-meta-title>
                            <nz-list-item-meta-description>
                                <div style="display: flex; gap: 8px; align-items: center;">
                                    <nz-select [(ngModel)]="step.type" style="width: 150px;" 
                                              (ngModelChange)="onStepTypeChange(step, $event)">
                                        <nz-option *ngFor="let type of workflowStepTypes" 
                                                   [nzValue]="type.value" 
                                                   [nzLabel]="type.label">
                                            <div>
                                                <div>{{ type.label }}</div>
                                                <small style="color: #999;">{{ type.description }}</small>
                                            </div>
                                        </nz-option>
                                    </nz-select>
                                    <nz-input-group>
                                        <input nz-input [(ngModel)]="step.description" placeholder="步驟描述" />
                                    </nz-input-group>
                                </div>
                            </nz-list-item-meta-description>
                        </nz-list-item-meta>
                        <ul nz-list-item-actions>
                            <li>
                                <nz-switch [(ngModel)]="step.isActive" nzSize="small"></nz-switch>
                            </li>
                            <li>
                                <button nz-button nzType="link" nzSize="small" (click)="moveStepUp(i)"
                                    [disabled]="i === 0">
                                    <span nz-icon nzType="up"></span>
                                </button>
                            </li>
                            <li>
                                <button nz-button nzType="link" nzSize="small" (click)="moveStepDown(i)"
                                    [disabled]="i === workflowSteps.length - 1">
                                    <span nz-icon nzType="down"></span>
                                </button>
                            </li>
                            <li>
                                <button nz-button nzType="link" nzSize="small" (click)="configureStep(step)">
                                    <span nz-icon nzType="setting"></span>
                                </button>
                            </li>
                            <li>
                                <button nz-button nzType="link" nzSize="small" nzDanger (click)="removeStep(i)">
                                    <span nz-icon nzType="delete"></span>
                                </button>
                            </li>
                        </ul>
                    </nz-list-item>
                </ng-template>
            </nz-list>

            <!-- 新增步驟按鈕 -->
            <div style="margin-top: 16px;">
                <button nz-button nzType="dashed" (click)="addWorkflowStep()">
                    <span nz-icon nzType="plus"></span>新增流程步驟
                </button>
            </div>

            <!-- 流程統計信息 -->
            <div style="margin-top: 16px; padding: 16px; background: #f5f5f5; border-radius: 6px;">
                <h5>流程統計</h5>
                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <div>
                        <strong>總步驟數:</strong> {{ workflowSteps.length }}
                    </div>
                    <div>
                        <strong>啟用步驟:</strong> {{ getActiveStepsCount() }}
                    </div>
                    <div>
                        <strong>必填步驟:</strong> {{ getRequiredStepsCount() }}
                    </div>
                    <div>
                        <strong>審核步驟:</strong> {{ getApprovalStepsCount() }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</nz-card>

<style>
.workflow-editor {
    padding: 16px;
}

.workflow-content h4 {
    margin-bottom: 16px;
    color: #1890ff;
}

.no-selection {
    text-align: center;
    padding: 40px;
}

.loading {
    text-align: center;
    padding: 40px;
}

.workflow-content {
    max-width: 100%;
}

.ant-list-item-meta-title {
    margin-bottom: 8px !important;
}

.ant-list-item-meta-description {
    margin-bottom: 8px !important;
}
</style>
