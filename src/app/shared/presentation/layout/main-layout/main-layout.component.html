<nz-layout class="main-layout">
    <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed" [nzTrigger]="null">
        <div class="logo">
            <img src="assets/logo-full.svg" alt="logo" />
        </div>
        <app-sidebar [isCollapsed]="isCollapsed"></app-sidebar>
    </nz-sider>
    <nz-layout>
        <nz-header>
            <app-header [isCollapsed]="isCollapsed" (isCollapsedChange)="isCollapsed = $event"></app-header>
        </nz-header>
        <nz-content>
            <app-tab></app-tab>
            <div class="inner-content">
                <router-outlet></router-outlet>
            </div>
        </nz-content>
    </nz-layout>
</nz-layout>
